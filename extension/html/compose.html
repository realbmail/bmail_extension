<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMail Compose Sandbox</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.14), transparent 38%),
                linear-gradient(180deg, #f8fafc 0%, #ecfeff 100%);
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .compose-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 24px 20px;
            box-sizing: border-box;
        }

        .compose-card {
            display: grid;
            gap: 16px;
            padding: 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.22);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        .compose-title {
            font-size: 20px;
            font-weight: 700;
        }

        .compose-copy {
            font-size: 13px;
            line-height: 1.6;
            color: #475569;
        }

        .compose-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .compose-btn {
            border: 0;
            border-radius: 999px;
            padding: 11px 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .compose-btn-primary {
            background: linear-gradient(135deg, #0f766e, #0ea5e9);
            color: #ffffff;
        }

        .compose-btn-secondary {
            background: rgba(15, 23, 42, 0.08);
            color: #0f172a;
        }

        .compose-log {
            display: grid;
            gap: 8px;
            min-height: 120px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.04);
            font-size: 12px;
            color: #334155;
            overflow: auto;
        }
    </style>
</head>
<body>
<main class="compose-shell">
    <section class="compose-card">
        <div>
            <div class="compose-title">BMail Compose Sandbox</div>
            <p class="compose-copy">
                Sprint 1 只验证 iframe 加载、侧栏挂载和双向 postMessage 通路。
                `SEND_EMAIL` 当前会命中宿主侧预留的 `MailSiteAdapter.fillAndSend()` 接入点。
            </p>
        </div>
        <div class="compose-actions">
            <button id="compose-send-test" class="compose-btn compose-btn-primary" type="button">Send Test Message</button>
            <button id="compose-close-panel" class="compose-btn compose-btn-secondary" type="button">Close Panel</button>
        </div>
        <div id="compose-log" class="compose-log" aria-live="polite"></div>
    </section>
</main>
<script src="../js/compose.js"></script>
</body>
</html>
